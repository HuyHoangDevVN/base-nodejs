services:
  postgres_test:
    image: postgres:16
    container_name: obe-base-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-db_ecommerce_dev}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-db_ecommerce_dev}"]
      interval: 5s
      timeout: 5s
      retries: 12
