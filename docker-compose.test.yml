services:
  postgres_test:
    image: postgres:16-alpine
    container_name: obe-base-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-base_test}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-base_test_password}
      POSTGRES_DB: ${DATABASE_NAME:-base_nodejs_test}
    ports:
      - "${DATABASE_PORT:-54329}:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-base_test} -d ${DATABASE_NAME:-base_nodejs_test}"]
      interval: 5s
      timeout: 5s
      retries: 12
